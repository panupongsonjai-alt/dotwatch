name: Deploy Dashboard to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dotwatch-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dotwatch-dashboard/package-lock.json

      - name: Check files
        run: |
          pwd
          ls
          cat package.json

      - name: Clean old files
        working-directory: dotwatch-dashboard
        run: |
          rm -rf node_modules
          rm -rf dist

      - name: Clean old dependencies
        working-directory: dotwatch-dashboard
        run: |
          rm -rf node_modules
          rm -rf dist    

      - name: Install dependencies
        working-directory: dotwatch-dashboard
        run: npm install

      - name: Build dashboard
        working-directory: dotwatch-dashboard
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dotwatch-dashboard/dist

  deploy:
    environment:
      name: github-pages

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4