services:
  - type: web
    name: dotwatch-ota
    runtime: node
    rootDir: services/ota-server
    buildCommand: npm run check
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: NODE_ENV
        value: production
      - key: PUBLIC_BASE_URL
        sync: false
      - key: OTA_ALLOW_UNREGISTERED_DEVICES
        value: "false"
      - key: OTA_REQUIRE_DEVICE_SCOPE
        value: "true"
      - key: OTA_REQUIRE_SIGNED_RELEASES
        value: "true"
      - key: OTA_RELEASE_KEY_ID
        sync: false
      - key: OTA_RELEASE_PUBLIC_KEY_FILE
        value: "keys/release-signing.public.pem"
      - key: OTA_RELEASE_PUBLIC_KEY_SHA256
        sync: false
      - key: OTA_DEVICE_REGISTRY_JSON
        sync: false
      - key: OTA_DEVICE_SECRETS_JSON
        value: "{}"
      - key: OTA_MAX_BODY_BYTES
        value: "16384"
      - key: OTA_RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: OTA_RATE_LIMIT_PER_IP
        value: "120"
      - key: OTA_RATE_LIMIT_PER_DEVICE
        value: "60"
      - key: OTA_AUTH_FAILURE_LIMIT_PER_IP
        value: "20"
      - key: OTA_AUTH_FAILURE_LIMIT_PER_DEVICE
        value: "10"
      - key: OTA_RATE_LIMIT_MAX_ENTRIES
        value: "10000"
