[platformio]
default_envs = esp32_product

[env]
platform = espressif32@7.0.1
board = esp32dev
monitor_speed = 115200
monitor_filters = time, esp32_exception_decoder
board_build.partitions = partitions_ota.csv

; Share one LVGL configuration with the application and LVGL sources.
build_flags =
  -Iinclude
  -DCORE_DEBUG_LEVEL=1
  -DDOTWATCH_ALLOW_INSECURE_TLS_FALLBACK=0
  -DDOTWATCH_EXPECT_SECURE_BOOT=0
  -DDOTWATCH_EXPECT_FLASH_ENCRYPTION=0
  -DLV_CONF_INCLUDE_SIMPLE=1
  -DLV_LVGL_H_INCLUDE_SIMPLE=1
  -DLV_COLOR_DEPTH=16
  -DLV_COLOR_16_SWAP=0
  -DLV_USE_LABEL=1
  -DLV_USE_LINE=1
  -DLV_FONT_MONTSERRAT_12=1
  -DLV_FONT_MONTSERRAT_14=1
  -DLV_FONT_MONTSERRAT_18=1
  -DLV_FONT_MONTSERRAT_28=1
  -DLV_FONT_MONTSERRAT_40=1

lib_deps =
  bblanchon/ArduinoJson@^7.0.0
  adafruit/DHT sensor library@^1.4.6
  adafruit/Adafruit Unified Sensor@^1.1.14
  adafruit/Adafruit GFX Library@^1.12.6
  adafruit/Adafruit ILI9341@^1.6.3
  lvgl/lvgl@8.4.0

[env:esp32_product]
framework = arduino

; Dedicated expendable pilot board only. Secure Boot eFuses are irreversible.
; Flash encryption remains in development mode to preserve a limited recovery path.
[env:esp32_product_secure_pilot]
framework = arduino, espidf
board_build.partitions = partitions_secure_ota.csv
board_build.secure_boot_signing_key = ${sysenv.DOTWATCH_SECURE_BOOT_SIGNING_KEY}
board_build.esp-idf.sdkconfig_path = sdkconfig.secure.pilot.generated
board_build.cmake_extra_args =
  -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.secure.common;sdkconfig.secure.pilot;sdkconfig.secure.local"
build_unflags =
  -DDOTWATCH_EXPECT_SECURE_BOOT=0
  -DDOTWATCH_EXPECT_FLASH_ENCRYPTION=0
build_flags =
  ${env.build_flags}
  -DDOTWATCH_EXPECT_SECURE_BOOT=1
  -DDOTWATCH_EXPECT_FLASH_ENCRYPTION=1

; Production manufacturing profile. Use only on a fresh revision-v3 ESP32 after pilot approval.
[env:esp32_product_secure_release]
framework = arduino, espidf
board_build.partitions = partitions_secure_ota.csv
board_build.secure_boot_signing_key = ${sysenv.DOTWATCH_SECURE_BOOT_SIGNING_KEY}
board_build.esp-idf.sdkconfig_path = sdkconfig.secure.release.generated
board_build.cmake_extra_args =
  -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.secure.common;sdkconfig.secure.release;sdkconfig.secure.local"
build_unflags =
  -DDOTWATCH_EXPECT_SECURE_BOOT=0
  -DDOTWATCH_EXPECT_FLASH_ENCRYPTION=0
build_flags =
  ${env.build_flags}
  -DDOTWATCH_EXPECT_SECURE_BOOT=1
  -DDOTWATCH_EXPECT_FLASH_ENCRYPTION=1
