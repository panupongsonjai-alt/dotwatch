services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: dotwatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dotwatch
      POSTGRES_PASSWORD: dotwatch123
      POSTGRES_DB: dotwatch
    ports:
      - "5432:5432"
    volumes:
      - dotwatch_pgdata:/var/lib/postgresql/data

  backend:
    build: ./services/backend
    container_name: dotwatch-backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./services/backend/.env
    ports:
      - "4000:4000"
    volumes:
      - ./services/backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run migrate && npm run dev"

  dashboard:
    build: ./apps/dashboard
    container_name: dotwatch-dashboard
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./apps/dashboard:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  admin:
    build: ./apps/admin
    container_name: dotwatch-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:5174"
    volumes:
      - ./apps/admin:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"

volumes:
  dotwatch_pgdata:
